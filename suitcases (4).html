<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VOYA — Luggage Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --dark: #1a1714;
      --warm-mid: #8c7b6b;
      --accent: #c9a96e;
      --accent-light: #e8d5b0;
      --card-bg: #fdfaf5;
      --border: #e0d5c5;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--dark);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* HEADER */
    header {
      padding: 3rem 4rem 2rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.8s ease both;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      color: var(--dark);
      text-transform: uppercase;
    }

    .logo span {
      color: var(--accent);
    }

    .header-tagline {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--warm-mid);
      padding-bottom: 0.4rem;
    }

    /* HERO BAND */
    .hero-band {
      padding: 2.5rem 4rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      animation: fadeDown 0.9s 0.1s ease both;
    }

    .hero-band h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.8rem;
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: 0.02em;
    }

    .hero-band h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-band .divider {
      width: 1px;
      height: 80px;
      background: var(--border);
      flex-shrink: 0;
    }

    .hero-band p {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      line-height: 1.9;
      color: var(--warm-mid);
      max-width: 280px;
      text-transform: uppercase;
    }

    /* FILTER BAR */
    .filter-bar {
      padding: 0 4rem 2rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      animation: fadeDown 1s 0.2s ease both;
    }

    .filter-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--warm-mid);
      margin-right: 0.5rem;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      padding: 0.4rem 1.1rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--warm-mid);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--dark);
      border-color: var(--dark);
      color: var(--cream);
    }

    /* GRID */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      padding: 0 4rem 6rem;
    }

    /* PRODUCT CARD */
    .card {
      background: var(--card-bg);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      animation: cardReveal 0.7s ease forwards;
    }

    .card:nth-child(1) { animation-delay: 0.3s; }
    .card:nth-child(2) { animation-delay: 0.45s; }
    .card:nth-child(3) { animation-delay: 0.6s; }
    .card:nth-child(4) { animation-delay: 0.75s; }
    .card:nth-child(5) { animation-delay: 0.9s; }
    .card:nth-child(6) { animation-delay: 1.05s; }

    .card-image-wrap {
      position: relative;
      overflow: hidden;
      background: #f0ebe2;
      aspect-ratio: 4/4.5;
    }

    .card-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: block;
    }

    .card:hover .card-image-wrap img {
      transform: scale(1.06);
    }

    /* Color swatch on image */
    .card-tag {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: var(--dark);
      color: var(--cream);
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
    }

    .card-tag.new { background: var(--accent); color: var(--dark); }
    .card-tag.sale { background: #8b4040; }

    /* Overlay on hover */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(26, 23, 20, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .card:hover .card-overlay { opacity: 1; }

    .overlay-btn {
      border: 1px solid var(--cream);
      color: var(--cream);
      background: transparent;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.75rem 2rem;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .overlay-btn:hover {
      background: var(--cream);
      color: var(--dark);
    }

    /* Card info */
    .card-info {
      padding: 1.4rem 1.5rem 1.8rem;
      border-top: 1px solid var(--border);
    }

    .card-category {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 0.35rem;
      color: var(--dark);
    }

    .card-desc {
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      color: var(--warm-mid);
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.55rem;
      font-weight: 600;
      color: var(--dark);
      letter-spacing: 0.02em;
    }

    .card-price .old-price {
      font-size: 1rem;
      font-weight: 300;
      color: var(--warm-mid);
      text-decoration: line-through;
      margin-right: 0.5rem;
    }

    .card-colors {
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }

    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.15);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .color-dot:hover { transform: scale(1.3); }

    /* Loading & error states */
    .grid-status {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--warm-mid);
    }

    .grid-status .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer p {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--warm-mid);
    }

    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      letter-spacing: 0.3em;
      color: var(--dark);
    }

    /* ANIMATIONS */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    /* RESPONSIVE */
    @media (max-width: 1100px) {
      .product-grid { grid-template-columns: repeat(2, 1fr); padding: 0 2rem 4rem; }
      header, .hero-band, .filter-bar { padding-left: 2rem; padding-right: 2rem; }
    }

    @media (max-width: 680px) {
      .product-grid { grid-template-columns: 1fr; padding: 0 1rem 3rem; }
      header, .hero-band, .filter-bar { padding-left: 1.5rem; padding-right: 1.5rem; }
      .hero-band h1 { font-size: 2.5rem; }
      .logo { font-size: 2rem; }
      .hero-band .divider, .hero-band p { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">V<span>O</span>YA</div>
    <p class="header-tagline">Crafted for the discerning traveller</p>
  </header>

  <div class="hero-band">
    <h1>The Luggage<br><em>Collection</em></h1>
    <div class="divider"></div>
    <p>Each piece is engineered for decades of travel — built from premium materials, finished with precision hardware.</p>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Filter by:</span>
    <button class="filter-btn active" onclick="filterCards('all', this)">All</button>
    <button class="filter-btn" onclick="filterCards('carry-on', this)">Carry-On</button>
    <button class="filter-btn" onclick="filterCards('checked', this)">Checked</button>
    <button class="filter-btn" onclick="filterCards('set', this)">Sets</button>
  </div>

  <div class="product-grid" id="grid">
    <div class="grid-status">
      <div class="spinner"></div>
      Loading collection…
    </div>
  </div>

  <footer>
    <p>© 2026 Voya Luggage — All rights reserved</p>
    <span class="footer-logo">VOYA</span>
    <p>Free shipping on orders over $300</p>
  </footer>

  <script>
    // ── Google Sheet published as CSV ──────────────────────────────────────────
    const SHEET_CSV_URL =
      'https://docs.google.com/spreadsheets/d/e/2PACX-1vSeg4zbngbpX11qjXWxXX8eLqfnWwFtj9qaVntQN2KBciVvKf5wEf-H2rGyKkIXaFKseXAbJbRFTl0C/pub?gid=0&single=true&output=csv';

    // ── CSV parser (handles quoted fields with commas inside) ──────────────────
    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];

      const headers = splitCSVRow(lines[0]).map(h => h.trim().toLowerCase());
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const vals = splitCSVRow(lines[i]);
        const obj = {};
        headers.forEach((h, idx) => { obj[h] = (vals[idx] || '').trim(); });
        rows.push(obj);
      }
      return rows;
    }

    function splitCSVRow(row) {
      const result = [];
      let cur = '';
      let inQuotes = false;
      for (let i = 0; i < row.length; i++) {
        const ch = row[i];
        if (ch === '"') {
          if (inQuotes && row[i + 1] === '"') { cur += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if (ch === ',' && !inQuotes) {
          result.push(cur); cur = '';
        } else {
          cur += ch;
        }
      }
      result.push(cur);
      return result;
    }

    // ── Build a card element from a product row ────────────────────────────────
    // Sheet columns: card-name, card-caregory, card-desc, card-price, image
    function buildCard(product, index) {
      const card = document.createElement('div');
      card.className = 'card';

      const name        = (product['card-name']     || '').trim();
      const rawCategory = (product['card-caregory'] || '').trim();
      const desc        = (product['card-desc']     || '').trim();
      const price       = (product['card-price']    || '').trim();
      let   imgSrc      = (product['image']         || '').trim();

      // Prepend https:// if URL is protocol-relative
      if (imgSrc && !imgSrc.startsWith('http')) imgSrc = 'https://' + imgSrc;

      // Derive filter type from category text
      let dataType = 'other';
      if (/carry.?on/i.test(rawCategory))    dataType = 'carry-on';
      else if (/set/i.test(rawCategory))     dataType = 'set';
      else if (/checked/i.test(rawCategory)) dataType = 'checked';
      card.dataset.type = dataType;

      // Animation stagger
      card.style.animationDelay = (0.3 + index * 0.15) + 's';

      card.innerHTML = `
        <div class="card-image-wrap">
          <img src="${imgSrc}" alt="${name}" loading="lazy"/>
          <div class="card-overlay">
            <button class="overlay-btn">Quick View</button>
          </div>
        </div>
        <div class="card-info">
          <p class="card-category">${rawCategory}</p>
          <h2 class="card-name">${name}</h2>
          <p class="card-desc">${desc}</p>
          <div class="card-footer">
            <span class="card-price">${price}</span>
          </div>
        </div>
      `;

      return card;
    }

    // ── Fetch & render ─────────────────────────────────────────────────────────
    async function loadProducts() {
      const grid = document.getElementById('grid');

      try {
        const response = await fetch(SHEET_CSV_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        const products = parseCSV(text).filter(p => p['card-name']); // skip empty rows

        grid.innerHTML = '';

        if (products.length === 0) {
          grid.innerHTML = '<div class="grid-status">No products found in the sheet.</div>';
          return;
        }

        products.forEach((product, i) => {
          grid.appendChild(buildCard(product, i));
        });

      } catch (err) {
        console.error('Failed to load products:', err);
        grid.innerHTML = `<div class="grid-status">
          Unable to load products. Please check the sheet is published and try again.<br>
          <small style="opacity:0.6;margin-top:0.5rem;display:block;">${err.message}</small>
        </div>`;
      }
    }

    // ── Filter ─────────────────────────────────────────────────────────────────
    function filterCards(type, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      document.querySelectorAll('.card').forEach(card => {
        if (type === 'all' || card.dataset.type === type) {
          card.style.display = '';
          card.style.opacity = '0';
          card.style.transform = 'translateY(14px)';
          requestAnimationFrame(() => {
            card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
          });
        } else {
          card.style.display = 'none';
        }
      });
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    loadProducts();
  </script>

</body>
</html>
